name: Skyscanner Price Tracker

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Zainstaluj zależności Python
        run: pip install -r requirements.txt

      - name: Zainstaluj Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Zapisz credentials.json z Secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Uruchom scraper
        run: python scraper.py

      - name: Wgraj screenshoty jako artefakty
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot_*.png
          if-no-files-found: ignore

      - name: Usuń credentials.json
        if: always()
        run: rm -f credentials.json
